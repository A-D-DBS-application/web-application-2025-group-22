<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" role="img" aria-labelledby="title desc">
  <title id="title">DataSight logo</title>
  <desc id="desc">Stylized eye with warm color palette and the word DataSight beneath it.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f0e4" />
      <stop offset="100%" stop-color="#efe2cf" />
    </linearGradient>
  </defs>
  <rect width="360" height="260" rx="22" fill="url(#bg)" />
  <!-- Left bars -->
  <rect x="68" y="108" width="20" height="62" rx="6" fill="#b46c38" />
  <rect x="96" y="88" width="20" height="82" rx="6" fill="#d19455" />
  <rect x="124" y="68" width="20" height="102" rx="6" fill="#e2aa6a" />
  <!-- Eye icon -->
  <path d="M195 74c60 0 108 56 108 56s-48 56-108 56-108-56-108-56 48-56 108-56Z" fill="#6c3b1e" />
  <circle cx="195" cy="130" r="48" fill="#e8d1b8" />
  <circle cx="195" cy="130" r="30" fill="#c27b44" />
  <circle cx="195" cy="130" r="18" fill="#9c4f24" />
  <!-- Text -->
  <text x="50%" y="210" text-anchor="middle" font-family="'Inter', 'Montserrat', 'Arial', sans-serif" font-size="48" font-weight="700" fill="#6c3b1e">DataSight</text>
</svg>
