<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login / Sign up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_login.css') }}">
    <script>
        function setAction(actionType) {
            document.getElementById("action-field").value = actionType;
        }
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById("action-field").value = 'login';
        });
    </script>
</head>

<body>
    <div class="login-container">
        <a href="{{ url_for('main.home_page') }}">
            <img src="{{ url_for('static', filename='datasight-logo.svg') }}" alt="DataSight logo" class="logo">
        </a>
        <h1>Welcome</h1>

        <form id="login-form" method="POST" action="{{ url_for('main.login') }}">
            <input type="hidden" id="action-field" name="action" value="">
            <input type="text" id="name" name="name" placeholder="Name" required>

            <button type="submit" onclick="setAction('login')">Log in</button>
            <button type="submit" onclick="setAction('signup')">Sign up</button>
        </form>

        {% if message %}
            <p class="message">{{ message }}</p>
        {% endif %}

    </div>
</body>
</html>
